<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>About Tandem</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a1628;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 30px;
      user-select: none;
      -webkit-app-region: drag;
    }
    .logo {
      width: 180px;
      height: auto;
      opacity: 0.85;
      margin-bottom: 20px;
    }
    .title {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }
    .title .t { color: #e94560; }
    .title .rest { color: #ffffff; }
    .subtitle {
      font-size: 14px;
      color: #8892a4;
      margin-bottom: 16px;
    }
    .quote {
      font-style: italic;
      color: #a0aec0;
      font-size: 13px;
      margin-bottom: 24px;
    }
    .version {
      background: rgba(233, 69, 96, 0.15);
      color: #e94560;
      padding: 4px 14px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
    }
    .info {
      text-align: center;
      font-size: 13px;
      color: #8892a4;
      line-height: 1.8;
      margin-bottom: 24px;
    }
    .links {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      -webkit-app-region: no-drag;
    }
    .links a {
      color: #60a5fa;
      text-decoration: none;
      font-size: 13px;
      padding: 6px 14px;
      border: 1px solid rgba(96, 165, 250, 0.3);
      border-radius: 8px;
      transition: all 0.2s;
    }
    .links a:hover {
      background: rgba(96, 165, 250, 0.1);
      border-color: rgba(96, 165, 250, 0.6);
    }
    .copyright {
      font-size: 12px;
      color: #4a5568;
    }
    .team {
      font-size: 12px;
      color: #64748b;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <img class="logo" src="tandem-bike.png" alt="Tandem">
  <div class="title"><span class="t">T</span><span class="rest">andem</span></div>
  <div class="subtitle">Co-Pilot Browser</div>
  <div class="quote">"Jij bent mij en ik ben jou, samen zijn we 1"</div>
  <div class="version" id="version">v0.21.2</div>
  <div class="info">
    AI-Human symbiotic browser<br>
    Built for browsing together — human eyes, AI mind
  </div>
  <div class="links">
    <a href="https://github.com/hydro13" target="_blank">GitHub — hydro13</a>
    <a href="https://github.com/hydro13/tandem-browser" target="_blank">Tandem Repo</a>
  </div>
  <div class="copyright">© 2026 Mblock BV — Robin Waslander</div>
  <div class="team">Built by Robin & the GenX Team (Kees 🧀 + Max ⚡)</div>
</body>
</html>
