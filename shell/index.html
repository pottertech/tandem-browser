<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tandem Browser</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --accent: #e94560;
      --text: #eee;
      --text-dim: #888;
      --input-bg: #0f3460;
      --success: #4ecca3;
      --warning: #f0a500;
      --tab-bg: #111a30;
      --tab-active: #16213e;
      --tab-hover: #1a2744;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ═══ Tab bar ═══ */
    .tab-bar {
      display: flex;
      align-items: center;
      background: var(--tab-bg);
      border-bottom: 1px solid rgba(255,255,255,0.03);
      height: 38px;
      -webkit-app-region: drag;
      padding-left: 80px; /* macOS traffic lights */
      overflow-x: auto;
      overflow-y: hidden;
    }
    .tab-bar::-webkit-scrollbar { height: 0; }

    .tab {
      -webkit-app-region: no-drag;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 12px;
      height: 100%;
      min-width: 120px;
      max-width: 220px;
      background: transparent;
      border: none;
      color: var(--text-dim);
      font-size: 12px;
      cursor: pointer;
      border-right: 1px solid rgba(255,255,255,0.04);
      position: relative;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
      overflow: hidden;
    }
    .tab:hover { background: var(--tab-hover); color: var(--text); }
    .tab.active {
      background: var(--tab-active);
      color: var(--text);
      border-bottom: 2px solid var(--accent);
    }

    .tab .group-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .tab .tab-favicon {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      border-radius: 2px;
    }

    .tab .tab-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tab .tab-close {
      opacity: 0;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s, background 0.15s;
    }
    .tab:hover .tab-close { opacity: 1; }
    .tab .tab-close:hover { background: rgba(233,69,96,0.3); color: var(--accent); }

    .tab-new-btn {
      -webkit-app-region: no-drag;
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 18px;
      cursor: pointer;
      padding: 0 10px;
      height: 100%;
      transition: color 0.15s;
    }
    .tab-new-btn:hover { color: var(--text); }

    /* ═══ Toolbar ═══ */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: var(--surface);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .toolbar button {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 18px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: all 0.15s;
    }
    .toolbar button:hover { color: var(--text); background: rgba(255,255,255,0.1); }

    .url-bar {
      flex: 1;
      background: var(--input-bg);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 7px 16px;
      color: var(--text);
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    .url-bar:focus { border-color: var(--accent); }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--success);
      transition: background 0.3s;
    }
    .status-dot.loading { background: var(--warning); animation: pulse 1s infinite; }
    .status-dot.error { background: var(--accent); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .kees-badge {
      font-size: 11px;
      padding: 3px 8px;
      background: rgba(233, 69, 96, 0.2);
      border: 1px solid var(--accent);
      border-radius: 12px;
      color: var(--accent);
      cursor: default;
    }

    /* ═══ Main layout (browser + panel) ═══ */
    .main-layout {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    /* ═══ Browser content ═══ */
    .browser-content {
      flex: 1;
      position: relative;
      min-width: 200px;
    }

    .browser-content webview {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: none;
    }
    .browser-content webview.active {
      display: flex;
    }

    /* ═══ Draw overlay canvas ═══ */
    .draw-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      z-index: 100;
      pointer-events: none;
      cursor: default;
    }
    .draw-overlay.active {
      pointer-events: auto;
      cursor: crosshair;
    }

    /* ═══ Draw toolbar ═══ */
    .draw-toolbar {
      display: none;
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 101;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 6px 10px;
      gap: 6px;
      align-items: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .draw-toolbar.visible { display: flex; }
    .draw-toolbar button {
      background: none;
      border: 1px solid transparent;
      color: var(--text-dim);
      font-size: 16px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: all 0.15s;
    }
    .draw-toolbar button:hover { color: var(--text); background: rgba(255,255,255,0.1); }
    .draw-toolbar button.active { color: var(--accent); border-color: var(--accent); }
    .draw-toolbar .color-btn {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      padding: 0;
    }
    .draw-toolbar .color-btn.active { border-color: #fff; }
    .draw-toolbar .separator {
      width: 1px; height: 20px;
      background: rgba(255,255,255,0.15);
      margin: 0 4px;
    }

    /* ═══ Kees Panel ═══ */
    .kees-panel {
      width: 0;
      min-width: 0;
      background: var(--surface);
      border-left: 1px solid rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width 0.25s ease, min-width 0.25s ease;
    }
    .kees-panel.open {
      width: 360px;
      min-width: 280px;
    }

    .panel-resize-handle {
      position: absolute;
      top: 0; bottom: 0;
      width: 4px;
      cursor: col-resize;
      z-index: 200;
      background: transparent;
      display: none;
    }
    .kees-panel.open ~ .panel-resize-handle,
    .panel-resize-handle.visible { display: block; }

    .panel-header {
      padding: 12px 14px;
      background: var(--tab-bg);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .panel-header h2 { font-size: 14px; font-weight: 600; flex: 1; }
    .panel-header .panel-tab {
      background: none; border: none;
      color: var(--text-dim); font-size: 12px;
      cursor: pointer; padding: 4px 8px;
      border-radius: 4px; transition: all 0.15s;
    }
    .panel-header .panel-tab:hover { color: var(--text); }
    .panel-header .panel-tab.active { color: var(--accent); background: rgba(233,69,96,0.15); }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }
    .panel-body::-webkit-scrollbar { width: 4px; }
    .panel-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    /* Activity log */
    .activity-item {
      padding: 6px 8px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      font-size: 11px;
      color: var(--text-dim);
      display: flex;
      gap: 6px;
      align-items: flex-start;
    }
    .activity-item .a-icon { flex-shrink: 0; }
    .activity-item .a-source { flex-shrink: 0; font-size: 10px; }
    .activity-item .a-source.robin { color: var(--success); }
    .activity-item .a-source.kees { color: var(--accent); }
    .activity-item .a-text { flex: 1; word-break: break-word; }
    .activity-item .a-time { flex-shrink: 0; opacity: 0.5; font-size: 10px; }

    /* Tab source indicator */
    .tab .tab-source { font-size: 10px; flex-shrink: 0; margin-right: 2px; }

    /* Chat */
    .chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; padding-bottom: 8px; }
    .chat-msg {
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 12px;
      line-height: 1.4;
      max-width: 85%;
      word-break: break-word;
    }
    .chat-msg.robin { background: rgba(78, 204, 163, 0.2); border: 1px solid rgba(78, 204, 163, 0.3); align-self: flex-end; color: var(--text); }
    .chat-msg.kees { background: rgba(233,69,96,0.15); border: 1px solid rgba(233,69,96,0.2); align-self: flex-start; color: var(--text); }
    .chat-msg .msg-from { font-size: 10px; opacity: 0.5; margin-bottom: 2px; }
    .chat-msg .msg-time { font-size: 9px; opacity: 0.35; margin-top: 3px; text-align: right; }

    .chat-input-wrap {
      display: flex;
      gap: 6px;
      padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }
    .chat-input {
      flex: 1;
      background: var(--input-bg);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 8px 10px;
      color: var(--text);
      font-size: 12px;
      outline: none;
      resize: none;
      min-height: 36px;
      max-height: 80px;
    }
    .chat-input:focus { border-color: var(--accent); }
    .chat-send-btn {
      background: var(--accent);
      border: none;
      color: #fff;
      border-radius: 8px;
      padding: 0 12px;
      cursor: pointer;
      font-size: 14px;
      transition: opacity 0.15s;
    }
    .chat-send-btn:hover { opacity: 0.85; }

    /* Voice indicator — large, prominent */
    .voice-indicator {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: rgba(233, 69, 96, 0.25);
      border: 2px solid var(--accent);
      border-radius: 12px;
      font-size: 13px;
      color: var(--accent);
      margin-bottom: 8px;
      font-weight: 600;
    }
    .voice-indicator.active { display: flex; }
    .voice-dot {
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--accent);
      animation: voicePulse 0.8s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes voicePulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.4); opacity: 0.5; }
    }
    .voice-label { white-space: nowrap; }
    .voice-transcript-live {
      flex: 1;
      font-style: italic;
      opacity: 0.8;
      font-weight: 400;
    }

    /* Typing indicator */
    .typing-indicator {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      font-size: 11px;
      color: var(--text-dim);
      font-style: italic;
    }
    .typing-indicator.active { display: flex; }
    .typing-dots span {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      margin: 0 1px;
      animation: typingBounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-4px); }
    }

    /* Screenshots section — grid layout */
    .screenshot-preview {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .screenshot-preview .ss-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .screenshot-preview img {
      width: 100%;
      aspect-ratio: 16/10;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.08);
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .screenshot-preview img:hover { border-color: var(--accent); }
    .screenshot-preview .ss-label {
      font-size: 9px;
      color: var(--text-dim);
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ═══ Copilot overlay ═══ */
    .copilot-overlay {
      display: none;
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 12px;
      padding: 16px 20px;
      max-width: 360px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      z-index: 1000;
      animation: slideIn 0.3s ease;
    }
    .copilot-overlay.visible { display: block; }
    .copilot-overlay h3 { color: var(--accent); margin-bottom: 8px; font-size: 14px; }
    .copilot-overlay p { color: var(--text-dim); font-size: 13px; line-height: 1.5; }
    .copilot-overlay .dismiss {
      position: absolute;
      top: 8px;
      right: 12px;
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 16px;
    }

    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- Tab bar -->
  <div class="tab-bar" id="tab-bar">
    <button class="tab-new-btn" id="btn-new-tab" title="Nieuwe tab (Cmd+T)">+</button>
  </div>

  <!-- Navigation toolbar -->
  <div class="toolbar">
    <button id="btn-back" title="Terug">←</button>
    <button id="btn-forward" title="Vooruit">→</button>
    <button id="btn-reload" title="Herladen">⟳</button>
    <input class="url-bar" id="url-bar" type="text" placeholder="Voer URL in of zoek..." value="">
    <button id="btn-screenshot" title="Screenshot (⌘⇧S)">📸</button>
    <div class="status-dot" id="status-dot" title="Verbonden met Kees API"></div>
    <span class="kees-badge">🧀 Kees</span>
  </div>

  <!-- Main layout: browser + panel -->
  <div class="main-layout">
    <!-- Webview container -->
    <div class="browser-content" id="webview-container">
      <!-- Draw overlay canvas (SHELL layer, NOT in webview — anti-detect!) -->
      <canvas class="draw-overlay" id="draw-canvas"></canvas>
      <!-- Draw toolbar -->
      <div class="draw-toolbar" id="draw-toolbar">
        <button data-tool="arrow" title="Pijl">↗</button>
        <button data-tool="rect" title="Rechthoek">▢</button>
        <button data-tool="circle" title="Cirkel">◯</button>
        <button data-tool="line" title="Vrije lijn" class="active">✎</button>
        <button data-tool="text" title="Tekst">T</button>
        <div class="separator"></div>
        <button class="color-btn active" data-color="#e94560" style="background:#e94560" title="Rood"></button>
        <button class="color-btn" data-color="#f0a500" style="background:#f0a500" title="Geel"></button>
        <button class="color-btn" data-color="#4ecca3" style="background:#4ecca3" title="Groen"></button>
        <button class="color-btn" data-color="#4285f4" style="background:#4285f4" title="Blauw"></button>
        <div class="separator"></div>
        <button id="btn-draw-clear" title="Wissen">🗑</button>
        <button id="btn-snap-kees" title="📸 Snap voor Kees">📸</button>
      </div>
    </div>

    <!-- Kees Panel (SHELL layer, NOT in webview — anti-detect!) -->
    <div class="kees-panel" id="kees-panel">
      <div class="panel-header">
        <h2>🧀 Kees</h2>
        <button class="panel-tab active" data-panel-tab="activity">Activity</button>
        <button class="panel-tab" data-panel-tab="chat">Chat</button>
        <button class="panel-tab" data-panel-tab="screenshots">📸</button>
      </div>
      <div class="panel-body" id="panel-body">
        <!-- Activity tab -->
        <div class="panel-content" id="panel-activity" style="display:flex;flex-direction:column;flex:1;">
        </div>
        <!-- Chat tab -->
        <div class="panel-content" id="panel-chat" style="display:none;flex-direction:column;flex:1;">
          <div class="voice-indicator" id="voice-indicator">
            <span class="voice-dot"></span>
            <span class="voice-label">🎙️ Spreek nu...</span>
            <span class="voice-transcript-live" id="voice-live-text"></span>
          </div>
          <div class="chat-messages" id="chat-messages"></div>
          <div class="typing-indicator" id="kees-typing">
            <span class="typing-dots"><span></span><span></span><span></span></span>
            <span>Kees denkt...</span>
          </div>
          <div class="chat-input-wrap">
            <textarea class="chat-input" id="chat-input" placeholder="Bericht aan Kees..." rows="1"></textarea>
            <button class="chat-send-btn" id="btn-chat-send">→</button>
          </div>
        </div>
        <!-- Screenshots tab -->
        <div class="panel-content" id="panel-screenshots" style="display:none;flex-direction:column;flex:1;">
          <div class="screenshot-preview" id="screenshot-list">
            <p style="font-size:12px;color:var(--text-dim);text-align:center;padding:20px;">Nog geen screenshots. Gebruik Cmd+D → 📸</p>
          </div>
        </div>
      </div>
    </div>
    <!-- Panel resize handle -->
    <div class="panel-resize-handle" id="panel-resize"></div>
  </div>

  <!-- Copilot alert overlay -->
  <div class="copilot-overlay" id="copilot-overlay">
    <button class="dismiss" onclick="dismissAlert()">✕</button>
    <h3 id="alert-title">🧀 Kees heeft je nodig</h3>
    <p id="alert-body">...</p>
  </div>

  <script>
    // ═══════════════════════════════════════════════
    // Tab management system (renderer side)
    // ═══════════════════════════════════════════════

    const tabBar = document.getElementById('tab-bar');
    const btnNewTab = document.getElementById('btn-new-tab');
    const urlBar = document.getElementById('url-bar');
    const statusDot = document.getElementById('status-dot');
    const container = document.getElementById('webview-container');
    const overlay = document.getElementById('copilot-overlay');

    /** Map of tabId → { webview, tabEl } */
    const tabs = new Map();
    let activeTabId = null;

    /**
     * Exposed to main process via window.__tandemTabs
     * TabManager calls these via executeJavaScript
     */
    window.__tandemTabs = {
      /** Create a new webview, return its webContentsId */
      createTab(tabId, url) {
        const wv = document.createElement('webview');
        wv.setAttribute('src', url);
        wv.setAttribute('allowpopups', '');
        wv.setAttribute('partition', 'persist:tandem');
        wv.dataset.tabId = tabId;
        container.appendChild(wv);

        // Create tab bar element
        const tabEl = document.createElement('div');
        tabEl.className = 'tab';
        tabEl.dataset.tabId = tabId;
        tabEl.innerHTML = `
          <span class="tab-source" title="Robin controlled">👤</span>
          <span class="group-dot" style="display:none"></span>
          <img class="tab-favicon" src="" style="display:none">
          <span class="tab-title">New Tab</span>
          <button class="tab-close" title="Sluit tab">✕</button>
        `;

        // Click to focus
        tabEl.addEventListener('click', (e) => {
          if (e.target.classList.contains('tab-close')) return;
          if (window.tandem) window.tandem.focusTab(tabId);
        });

        // Close button
        tabEl.querySelector('.tab-close').addEventListener('click', () => {
          if (window.tandem) window.tandem.closeTab(tabId);
        });

        // Insert before the + button
        tabBar.insertBefore(tabEl, btnNewTab);

        tabs.set(tabId, { webview: wv, tabEl });

        // Wire up webview events
        wv.addEventListener('did-navigate', (e) => updateTabMeta(tabId, { url: e.url }));
        wv.addEventListener('did-navigate-in-page', (e) => {
          if (e.isMainFrame) updateTabMeta(tabId, { url: e.url });
        });
        wv.addEventListener('page-title-updated', (e) => updateTabMeta(tabId, { title: e.title }));
        wv.addEventListener('page-favicon-updated', (e) => {
          if (e.favicons && e.favicons.length > 0) {
            updateTabMeta(tabId, { favicon: e.favicons[0] });
          }
        });
        wv.addEventListener('did-start-loading', () => {
          if (tabId === activeTabId) statusDot.classList.add('loading');
        });
        wv.addEventListener('did-stop-loading', () => {
          if (tabId === activeTabId) statusDot.classList.remove('loading');
        });

        // Return webContentsId (available after dom-ready)
        return new Promise((resolve) => {
          wv.addEventListener('dom-ready', () => {
            resolve(wv.getWebContentsId());
          }, { once: true });
        });
      },

      /** Remove a tab */
      removeTab(tabId) {
        const entry = tabs.get(tabId);
        if (!entry) return;
        entry.webview.remove();
        entry.tabEl.remove();
        tabs.delete(tabId);
      },

      /** Focus/show a tab */
      focusTab(tabId) {
        // Hide all webviews, show the target
        for (const [id, entry] of tabs) {
          if (id === tabId) {
            entry.webview.classList.add('active');
            entry.tabEl.classList.add('active');
          } else {
            entry.webview.classList.remove('active');
            entry.tabEl.classList.remove('active');
          }
        }
        activeTabId = tabId;
        // Update URL bar
        const entry = tabs.get(tabId);
        if (entry) {
          try {
            const url = entry.webview.getURL();
            urlBar.value = url || '';
          } catch (_) {}
        }
      },
    };

    /** Update tab metadata in both UI and main process */
    function updateTabMeta(tabId, data) {
      const entry = tabs.get(tabId);
      if (!entry) return;

      if (data.title) {
        entry.tabEl.querySelector('.tab-title').textContent = data.title;
        if (tabId === activeTabId) document.title = `${data.title} — Tandem`;
      }
      if (data.url && tabId === activeTabId) {
        urlBar.value = data.url;
      }
      if (data.favicon) {
        const img = entry.tabEl.querySelector('.tab-favicon');
        img.src = data.favicon;
        img.style.display = '';
      }

      // Notify main process
      if (window.tandem) {
        window.tandem.sendTabUpdate({ tabId, ...data });
      }
    }

      wv.addEventListener('did-navigate-in-page', (e) => {
        if (e.isMainFrame) updateTabMeta('__initial', { url: e.url });
      });
      wv.addEventListener('page-title-updated', (e) => updateTabMeta('__initial', { title: e.title }));
      wv.addEventListener('page-favicon-updated', (e) => {
        if (e.favicons && e.favicons.length > 0) updateTabMeta('__initial', { favicon: e.favicons[0] });
      });

      wv.addEventListener('did-stop-loading', () => statusDot.classList.remove('loading'));

      // Register with main process once ready

        const wcId = wv.getWebContentsId();

          window.tandem.registerTab(wcId, initialUrl);

          const entry = tabs.get('__initial');

            entry.tabEl.addEventListener('click', (e) => {

            tabs.set(data.tabId, entry);
            activeTabId = data.tabId;

            // Re-register event listeners with new tabId
            entry.webview.addEventListener('did-navigate', (e) => updateTabMeta(data.tabId, { url: e.url }));
            entry.webview.addEventListener('page-title-updated', (e) => updateTabMeta(data.tabId, { title: e.title }));
            entry.webview.addEventListener('page-favicon-updated', (e) => {
              if (e.favicons && e.favicons.length > 0) updateTabMeta(data.tabId, { favicon: e.favicons[0] });

    // Panel resize

    // ═══════════════════════════════════════════════
    // Draw/Annotatie Tool
    // ═══════════════════════════════════════════════

    const drawCanvas = document.getElementById('draw-canvas');
    const drawToolbar = document.getElementById('draw-toolbar');
    const ctx = drawCanvas.getContext('2d');

    let drawEnabled = false;
    let currentTool = 'line';
    let currentColor = '#e94560';
    let isDrawing = false;
    let startX = 0, startY = 0;
    /** Store completed shapes for compositing */
    let shapes = [];
    /** Current freeform path points */
    let currentPath = [];

    function resizeCanvas() {
      const rect = drawCanvas.parentElement.getBoundingClientRect();
      drawCanvas.width = rect.width;
      drawCanvas.height = rect.height;
      redraw();
    }
    window.addEventListener('resize', resizeCanvas);
    setTimeout(resizeCanvas, 100);

    function redraw() {
      ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
      for (const shape of shapes) {
        drawShape(shape);
      }
    }

    function drawShape(s) {
      ctx.strokeStyle = s.color;
      ctx.fillStyle = s.color;
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      if (s.type === 'line') {
        ctx.beginPath();
        if (s.points.length > 0) {
          ctx.moveTo(s.points[0].x, s.points[0].y);
          for (let i = 1; i < s.points.length; i++) {
            ctx.lineTo(s.points[i].x, s.points[i].y);
          }
        }
        ctx.stroke();
      } else if (s.type === 'rect') {
        ctx.strokeRect(s.x, s.y, s.w, s.h);
      } else if (s.type === 'circle') {
        const rx = Math.abs(s.w) / 2;
        const ry = Math.abs(s.h) / 2;
        const cx = s.x + s.w / 2;
        const cy = s.y + s.h / 2;
        ctx.beginPath();
        ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
        ctx.stroke();
      } else if (s.type === 'arrow') {
        const dx = s.ex - s.sx;
        const dy = s.ey - s.sy;
        const angle = Math.atan2(dy, dx);
        const len = Math.sqrt(dx*dx + dy*dy);
        // Line
        ctx.beginPath();
        ctx.moveTo(s.sx, s.sy);
        ctx.lineTo(s.ex, s.ey);
        ctx.stroke();
        // Arrowhead
        const headLen = Math.min(20, len * 0.3);
        ctx.beginPath();
        ctx.moveTo(s.ex, s.ey);
        ctx.lineTo(s.ex - headLen * Math.cos(angle - 0.4), s.ey - headLen * Math.sin(angle - 0.4));
        ctx.moveTo(s.ex, s.ey);
        ctx.lineTo(s.ex - headLen * Math.cos(angle + 0.4), s.ey - headLen * Math.sin(angle + 0.4));
        ctx.stroke();
      } else if (s.type === 'text') {
        ctx.font = 'bold 16px -apple-system, sans-serif';
        ctx.fillText(s.text, s.x, s.y);
      }
    }

    drawCanvas.addEventListener('mousedown', (e) => {
      if (!drawEnabled) return;
      isDrawing = true;
      const rect = drawCanvas.getBoundingClientRect();
      startX = e.clientX - rect.left;
      startY = e.clientY - rect.top;
      if (currentTool === 'line') {
        currentPath = [{ x: startX, y: startY }];
      }
    });

    drawCanvas.addEventListener('mousemove', (e) => {
      if (!isDrawing || !drawEnabled) return;
      const rect = drawCanvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;

      if (currentTool === 'line') {
        currentPath.push({ x: mx, y: my });
        redraw();
        // Draw current path live
        ctx.strokeStyle = currentColor;
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.beginPath();
        ctx.moveTo(currentPath[0].x, currentPath[0].y);
        for (let i = 1; i < currentPath.length; i++) {
          ctx.lineTo(currentPath[i].x, currentPath[i].y);
        }
        ctx.stroke();
      } else {
        // Preview shape
        redraw();
        const preview = buildShape(mx, my);
        if (preview) drawShape(preview);
      }
    });

    drawCanvas.addEventListener('mouseup', (e) => {
      if (!isDrawing || !drawEnabled) return;
      isDrawing = false;
      const rect = drawCanvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;

      if (currentTool === 'text') {
        const text = prompt('Tekst:');
        if (text) shapes.push({ type: 'text', x: startX, y: startY, text, color: currentColor });
      } else if (currentTool === 'line') {
        if (currentPath.length > 1) {
          shapes.push({ type: 'line', points: [...currentPath], color: currentColor });
        }
        currentPath = [];
      } else {
        const shape = buildShape(mx, my);
        if (shape) shapes.push(shape);
      }
      redraw();
    });

    function buildShape(mx, my) {
      if (currentTool === 'rect') {
        return { type: 'rect', x: Math.min(startX, mx), y: Math.min(startY, my), w: Math.abs(mx - startX), h: Math.abs(my - startY), color: currentColor };
      } else if (currentTool === 'circle') {
        return { type: 'circle', x: Math.min(startX, mx), y: Math.min(startY, my), w: mx - startX, h: my - startY, color: currentColor };
      } else if (currentTool === 'arrow') {
        return { type: 'arrow', sx: startX, sy: startY, ex: mx, ey: my, color: currentColor };
      }
      return null;
    }

    // Draw tool buttons
    document.querySelectorAll('.draw-toolbar button[data-tool]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.draw-toolbar button[data-tool]').forEach(b => b.classList.remove('active'));

    // Color buttons

        btn.classList.add('active');
        currentColor = btn.dataset.color;
      });
    });

    // Clear
    document.getElementById('btn-draw-clear').addEventListener('click', () => {
      shapes = [];

    });

    // Snap for Kees
    document.getElementById('btn-snap-kees').addEventListener('click', () => {

    // Draw mode toggle from main process
    if (window.tandem) {

        if (drawEnabled) {

        } else {
          drawCanvas.classList.remove('active');
          drawToolbar.classList.remove('visible');
        }
      });

      window.tandem.onDrawClear(() => {
        shapes = [];
        redraw();
      });
    }

    /**
     * Composite screenshot: webview capture + canvas annotations → base64 PNG.
     * Called from main process via executeJavaScript.
     */
    window.__tandemDraw = {
      compositeScreenshot(webviewBase64) {
        return new Promise((resolve) => {
          const img = new Image();
          img.onload = () => {
            const offscreen = document.createElement('canvas');
            offscreen.width = img.width;
            offscreen.height = img.height;
            const octx = offscreen.getContext('2d');
            // Draw webview screenshot
            octx.drawImage(img, 0, 0);
            // Scale annotations to match webview size
            const scaleX = img.width / drawCanvas.width;
            const scaleY = img.height / drawCanvas.height;
            octx.scale(scaleX, scaleY);
            // Draw annotations canvas on top
            octx.drawImage(drawCanvas, 0, 0);
            // Export as base64 PNG (strip data URL prefix)
            const dataUrl = offscreen.toDataURL('image/png');
            resolve(dataUrl.replace(/^data:image\/png;base64,/, ''));
          };
          img.src = 'data:image/png;base64,' + webviewBase64;
        });
      }
    };

    // ═══════════════════════════════════════════════
    // Wire up webview activity tracking to panel
    // ═══════════════════════════════════════════════

    // Override the existing updateTabMeta to also log activity
    const _origUpdateTabMeta = updateTabMeta;
    updateTabMeta = function(tabId, data) {
      // Track navigation
      if (data.url && window.tandem) {
        // Activity is tracked via IPC in main process, but we also
        // need webview events. We'll send them up.
      }
      _origUpdateTabMeta(tabId, data);
    };

    // Patch __tandemTabs.createTab to add activity tracking on webview events
    const _origCreateTab = window.__tandemTabs.createTab;
    window.__tandemTabs.createTab = function(tabId, url) {
      const result = _origCreateTab.call(window.__tandemTabs, tabId, url);
      // After tab is created, wire activity events
      const entry = tabs.get(tabId);
      if (entry && entry.webview) {
        wireActivityEvents(entry.webview, tabId);
      }
      return result;
    };

    function wireActivityEvents(wv, tabId) {
      // Track navigation events → main process activity tracker
      wv.addEventListener('did-navigate', (e) => {
        if (window.tandem) window.tandem.sendWebviewEvent({ type: 'did-navigate', url: e.url, tabId });
      });
      wv.addEventListener('did-navigate-in-page', (e) => {
        if (e.isMainFrame && window.tandem) {
          window.tandem.sendWebviewEvent({ type: 'did-navigate-in-page', url: e.url, tabId });
        }
      });
      wv.addEventListener('did-start-loading', () => {
        if (window.tandem) window.tandem.sendWebviewEvent({ type: 'loading-start', tabId });
      });
      wv.addEventListener('did-stop-loading', () => {
        if (window.tandem) window.tandem.sendWebviewEvent({ type: 'loading-stop', tabId });
      });
    }

    // Also wire activity events for the initial tab
    (() => {
      const initialEntry = tabs.get(activeTabId);
      if (initialEntry && initialEntry.webview) {
        wireActivityEvents(initialEntry.webview, activeTabId);
      }
    })();

    // ═══════════════════════════════════════════════
    // Voice Input (Web Speech API — runs in SHELL, NOT webview!)
    // ═══════════════════════════════════════════════

    let speechRecognition = null;
    let voiceActive = false;

    function startVoiceRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        console.warn('Web Speech API not available');
        return;
      }

      speechRecognition = new SpeechRecognition();
      speechRecognition.lang = 'nl-BE';
      speechRecognition.continuous = true;
      speechRecognition.interimResults = true;

      speechRecognition.onresult = (event) => {
        let interimText = '';
        let finalText = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const transcript = event.results[i][0].transcript;
          if (event.results[i].isFinal) {
            finalText += transcript;
          } else {
            interimText += transcript;
          }
        }

        // Show live transcript
        const liveEl = document.getElementById('voice-live-text');
        if (liveEl) liveEl.textContent = interimText || finalText;

        // Send to main process
        if (window.tandem) {
          if (finalText) {
            window.tandem.sendVoiceTranscript(finalText, true);
            if (liveEl) liveEl.textContent = '';
          } else if (interimText) {
            window.tandem.sendVoiceTranscript(interimText, false);
          }
        }
      };

      speechRecognition.onerror = (event) => {
        console.warn('Speech recognition error:', event.error);
        if (event.error !== 'no-speech') {
          stopVoiceRecognition();
        }
      };

      speechRecognition.onend = () => {
        // Auto-restart if still supposed to be listening
        if (voiceActive && speechRecognition) {
          try { speechRecognition.start(); } catch(e) {}
        }
      };

      try {
        speechRecognition.start();
        voiceActive = true;
        document.getElementById('voice-indicator').classList.add('active');
        // Switch to chat tab
        document.querySelectorAll('.panel-tab').forEach(b => b.classList.remove('active'));
        document.querySelector('[data-panel-tab="chat"]').classList.add('active');
        document.getElementById('panel-activity').style.display = 'none';
        document.getElementById('panel-chat').style.display = 'flex';
        document.getElementById('panel-screenshots').style.display = 'none';
      } catch(e) {
        console.error('Failed to start speech recognition:', e);
      }
    }

    function stopVoiceRecognition() {
      voiceActive = false;
      if (speechRecognition) {
        try { speechRecognition.stop(); } catch(e) {}
        speechRecognition = null;
      }
      document.getElementById('voice-indicator').classList.remove('active');
      document.getElementById('voice-live-text').textContent = '';
      if (window.tandem) window.tandem.sendVoiceStatus(false);
    }

    if (window.tandem) {
      window.tandem.onVoiceToggle((data) => {
        if (data.listening) {
          startVoiceRecognition();
        } else {
          stopVoiceRecognition();
        }
      });

      // Voice transcript display (from main process, for final messages)
      window.tandem.onVoiceTranscript((data) => {
        // Already handled via onChatMessage for final messages
      });

      // Auto-snapshot request from activity tracker
      window.tandem.onAutoSnapshotRequest((data) => {
        // Trigger snap silently
        window.tandem.snapForKees();
      });
    }

    // ═══════════════════════════════════════════════
    // Settings — open in active tab
    // ═══════════════════════════════════════════════
    function openSettings() {
      const shellPath = window.location.href.replace(/\/[^/]*$/, '');
      const settingsUrl = shellPath + '/settings.html';
      const entry = tabs.get(activeTabId);
      if (entry) {
        entry.webview.loadURL(settingsUrl);
      }
    }

    // Handle tandem://settings in URL bar
    const _origUrlBarKeydown = urlBar.onkeydown;
    urlBar.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const val = urlBar.value.trim();
        if (val === 'tandem://settings') {
          e.preventDefault();
          e.stopImmediatePropagation();
          openSettings();
          return;
        }
      }
    }, true); // capture phase to run before existing handler

    // ═══════════════════════════════════════════════
    // Chat polling — fetch new messages every 2 seconds
    // Ensures messages sent via API (POST /chat) appear immediately
    // ═══════════════════════════════════════════════
    let lastKnownMsgId = 0;
    async function pollChatMessages() {
      try {
        const resp = await fetch(`http://localhost:8765/chat?since_id=${lastKnownMsgId}`);
        if (resp.ok) {
          const data = await resp.json();
          if (data.messages && data.messages.length > 0) {
            for (const msg of data.messages) {
              renderChatMessage(msg);
              if (msg.id > lastKnownMsgId) lastKnownMsgId = msg.id;
            }
          }
        }
      } catch { /* API not ready yet */ }
    }
    // Initial load of chat history
    setTimeout(async () => {
      try {
        const resp = await fetch('http://localhost:8765/chat?limit=100');
        if (resp.ok) {
          const data = await resp.json();
          if (data.messages) {
            for (const msg of data.messages) {
              renderChatMessage(msg);
              if (msg.id > lastKnownMsgId) lastKnownMsgId = msg.id;
            }
          }
        }
      } catch { /* API not ready yet */ }
    }, 1500);
    // Poll every 2 seconds
    setInterval(pollChatMessages, 2000);

    // ═══════════════════════════════════════════════
    // New tab page navigation messages
    // ═══════════════════════════════════════════════
    window.addEventListener('message', (e) => {
      if (e.data && e.data.type === 'tandem-newtab-navigate' && e.data.url) {
        const entry = tabs.get(activeTabId);
        if (entry) entry.webview.loadURL(e.data.url);
      }
    });

    // Clear URL bar when on newtab page
    function isNewtabUrl(url) {
      return url && (url.includes('newtab.html') || url.startsWith('file://') && url.endsWith('newtab.html'));
    }

    // Patch updateTabMeta to clear URL bar on newtab
    const _prevUpdateTabMeta = updateTabMeta;
    updateTabMeta = function(tabId, data) {
      _prevUpdateTabMeta(tabId, data);
      if (data.url && tabId === activeTabId && isNewtabUrl(data.url)) {
        urlBar.value = '';
      }
    };

    // ═══════════════════════════════════════════════
    // Screenshot preview with actual images in panel
    // ═══════════════════════════════════════════════

    // Override screenshot-taken handler to show base64 preview
    if (window.tandem) {
      // Remove old handler and add enhanced one
      window.tandem.onScreenshotTaken((data) => {
        const listEl = document.getElementById('screenshot-list');
        const placeholder = listEl.querySelector('p');
        if (placeholder) placeholder.remove();

        const div = document.createElement('div');
        div.className = 'ss-item';
        if (data.base64) {
          const imgSrc = `data:image/png;base64,${data.base64}`;
          div.innerHTML = `
            <img src="${imgSrc}" alt="${data.filename}" title="Klik om te vergroten">
            <div class="ss-label">${data.filename}</div>
          `;
          div.querySelector('img').addEventListener('click', () => {
            const win = window.open('', '_blank', 'width=1200,height=800');
            if (win) {
              win.document.write(`<!DOCTYPE html><html><head><title>${data.filename}</title><style>body{margin:0;background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh;}img{max-width:100%;max-height:100vh;}</style></head><body><img src="${imgSrc}"></body></html>`);
            }
          });
        } else {
          div.innerHTML = `<div class="ss-label">${data.filename}</div>`;
        }
        listEl.prepend(div);
      });
    }
  </script>
</body>
</html>
