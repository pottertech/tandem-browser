<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      color: #eee;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 0.5vh 20px 40px;
    }

    .logo-wrap {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 32px;
    }

    .logo-bg {
      width: 700px;
      height: auto;
      opacity: 0.45;
      pointer-events: none;
      user-select: none;
    }

    .logo {
      font-size: 48px;
      font-weight: 700;
      margin-top: -45px;
      letter-spacing: -1px;
      position: relative;
      z-index: 1;
    }

    .logo span { color: #e94560; }

    .subtitle {
      color: #888;
      font-size: 14px;
      position: relative;
      z-index: 1;
    }

    .search-box {
      width: 100%;
      max-width: 560px;
      position: relative;
      margin-bottom: 40px;
    }

    .search-box input {
      width: 100%;
      padding: 14px 20px;
      padding-left: 44px;
      font-size: 16px;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 12px;
      color: #eee;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box input:focus {
      border-color: #e94560;
    }

    .search-box input::placeholder {
      color: #555;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #555;
      font-size: 18px;
      pointer-events: none;
    }

    .quick-links {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
      max-width: 560px;
      margin-bottom: 48px;
    }

    .quick-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      color: #aaa;
      font-size: 11px;
      width: 72px;
      transition: color 0.2s;
    }

    .quick-link:hover { color: #eee; }

    .quick-link .icon {
      width: 48px;
      height: 48px;
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      transition: background 0.2s;
    }

    .quick-link:hover .icon {
      background: #1a2744;
    }

    .quick-link img {
      width: 24px;
      height: 24px;
      border-radius: 4px;
    }

    .recent-section {
      width: 100%;
      max-width: 560px;
    }

    .recent-section h3 {
      font-size: 13px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .recent-tabs {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .recent-tab {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: #16213e;
      border-radius: 8px;
      text-decoration: none;
      color: #ccc;
      font-size: 13px;
      transition: background 0.2s;
    }

    .recent-tab:hover { background: #1a2744; color: #eee; }

    .recent-tab img {
      width: 16px;
      height: 16px;
      border-radius: 2px;
    }

    .recent-tab .url {
      color: #555;
      font-size: 11px;
      margin-left: auto;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <script src="js/api-auth.js"></script>
  <div class="logo-wrap">
    <img class="logo-bg" src="tandem-bike.png" alt="">
    <div class="logo"><span>T</span>andem</div>
    <div class="subtitle">Co-Pilot Browser</div>
  </div>

  <div class="search-box">
    <span class="search-icon">&#x1F50D;</span>
    <input type="text" id="search" placeholder="Search or type a URL..." autofocus>
  </div>

  <div class="quick-links">
    <a class="quick-link" href="https://duckduckgo.com">
      <div class="icon"><img src="https://duckduckgo.com/favicon.ico" alt="DDG"></div>
      DuckDuckGo
    </a>
    <a class="quick-link" href="https://github.com">
      <div class="icon"><img src="https://github.com/favicon.ico" alt="GH"></div>
      GitHub
    </a>
    <a class="quick-link" href="https://linkedin.com">
      <div class="icon"><img src="https://linkedin.com/favicon.ico" alt="LI"></div>
      LinkedIn
    </a>
    <a class="quick-link" href="https://mail.google.com">
      <div class="icon"><img src="https://ssl.gstatic.com/ui/v1/icons/mail/rfr/gmail.ico" alt="GM"></div>
      Gmail
    </a>
    <a class="quick-link" href="https://youtube.com">
      <div class="icon"><img src="https://youtube.com/favicon.ico" alt="YT"></div>
      YouTube
    </a>
    <a class="quick-link" href="https://reddit.com">
      <div class="icon"><img src="https://reddit.com/favicon.ico" alt="RD"></div>
      Reddit
    </a>
    <a class="quick-link" href="https://claronote.com">
      <div class="icon">&#x1F4DD;</div>
      ClaroNote
    </a>
    <a class="quick-link" href="https://x.com">
      <div class="icon">&#x1D54F;</div>
      X
    </a>
  </div>

  <div class="recent-section">
    <h3>Recent tabs</h3>
    <div class="recent-tabs" id="recent-tabs">
      <div style="color: #555; font-size: 13px; padding: 8px;">Loading...</div>
    </div>
  </div>

  <script>
    const searchInput = document.getElementById('search');

    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const q = searchInput.value.trim();
        if (!q) return;

        // If it looks like a URL, navigate directly
        if (/^https?:\/\//i.test(q) || /^[a-zA-Z0-9-]+\.[a-zA-Z]{2,}/.test(q)) {
          const url = q.startsWith('http') ? q : 'https://' + q;
          window.location.href = url;
        } else {
          // Search with DuckDuckGo
          window.location.href = 'https://duckduckgo.com/?q=' + encodeURIComponent(q);
        }
      }
    });

    // Load recent tabs from API
    async function loadRecentTabs() {
      const container = document.getElementById('recent-tabs');
      try {
        const res = await fetch('http://localhost:8765/tabs/list');
        const data = await res.json();

        if (data.tabs && data.tabs.length > 0) {
          container.innerHTML = data.tabs
            .filter(t => t.url && !t.url.includes('newtab.html'))
            .slice(0, 5)
            .map(t => `
              <a class="recent-tab" href="${t.url}">
                <img src="https://www.google.com/s2/favicons?domain=${new URL(t.url).hostname}&sz=32" alt="">
                <span>${t.title || t.url}</span>
                <span class="url">${new URL(t.url).hostname}</span>
              </a>
            `).join('');

          if (!container.innerHTML.trim()) {
            container.innerHTML = '<div style="color: #555; font-size: 13px; padding: 8px;">No recent tabs</div>';
          }
        } else {
          container.innerHTML = '<div style="color: #555; font-size: 13px; padding: 8px;">No recent tabs</div>';
        }
      } catch (err) {
        container.innerHTML = '<div style="color: #555; font-size: 13px; padding: 8px;">No recent tabs</div>';
      }
    }

    loadRecentTabs();
  </script>
</body>
</html>
