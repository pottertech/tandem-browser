<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Kees PiP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --accent: #e94560;
      --text: #eee;
      --text-dim: #888;
      --input-bg: #0f3460;
      --success: #4ecca3;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      -webkit-app-region: drag;
      user-select: none;
    }

    /* Header */
    .pip-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: var(--surface);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      font-size: 12px;
      font-weight: 600;
    }
    .pip-header .title { display: flex; align-items: center; gap: 6px; }
    .status-indicators {
      display: flex; gap: 6px; font-size: 10px;
    }
    .status-indicators span { opacity: 0.6; }
    .status-indicators span.active { opacity: 1; }

    /* Activity feed */
    .activity-feed {
      flex: 1;
      overflow-y: auto;
      padding: 6px 10px;
      font-size: 11px;
    }
    .activity-feed::-webkit-scrollbar { width: 3px; }
    .activity-feed::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .feed-item {
      padding: 3px 0;
      color: var(--text-dim);
      border-bottom: 1px solid rgba(255,255,255,0.03);
      display: flex;
      gap: 6px;
      align-items: baseline;
    }
    .feed-item .icon { flex-shrink: 0; }
    .feed-item .text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .feed-item .time { flex-shrink: 0; font-size: 9px; opacity: 0.4; }

    /* Quick command */
    .quick-cmd {
      padding: 8px 10px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      gap: 6px;
      -webkit-app-region: no-drag;
    }
    .quick-cmd input {
      flex: 1;
      background: var(--input-bg);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      padding: 6px 10px;
      color: var(--text);
      font-size: 11px;
      outline: none;
    }
    .quick-cmd input:focus { border-color: var(--accent); }
    .quick-cmd button {
      background: var(--accent);
      border: none;
      color: #fff;
      border-radius: 6px;
      padding: 0 10px;
      cursor: pointer;
      font-size: 12px;
      -webkit-app-region: no-drag;
    }
    .quick-cmd button:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="pip-header">
    <span class="title">🧀 Kees PiP</span>
    <div class="status-indicators">
      <span id="status-api" title="API status">🟢</span>
      <span id="status-voice" title="Voice status">🎙️</span>
      <span id="status-learning" title="Learning status">🧬</span>
    </div>
  </div>

  <div class="activity-feed" id="activity-feed">
    <div class="feed-item">
      <span class="icon">⏳</span>
      <span class="text">Laden...</span>
    </div>
  </div>

  <div class="quick-cmd">
    <input type="text" id="cmd-input" placeholder="Bericht aan Kees..." autocomplete="off">
    <button id="cmd-send">→</button>
  </div>

  <script>
    const API = 'http://localhost:8765';
    const feedEl = document.getElementById('activity-feed');
    const cmdInput = document.getElementById('cmd-input');
    const cmdSend = document.getElementById('cmd-send');

    const icons = {
      navigate: '🧭', click: '👆', scroll: '📜', input: '⌨️',
      'tab-switch': '🔀', 'tab-open': '➕', 'tab-close': '✖️'
    };

    /** Fetch and render recent activity */
    async function refreshActivity() {
      try {
        const resp = await fetch(`${API}/activity-log?limit=3`);
        if (!resp.ok) return;
        const data = await resp.json();
        feedEl.innerHTML = '';
        if (data.entries && data.entries.length > 0) {
          for (const e of data.entries) {
            const icon = icons[e.type] || '•';
            const time = new Date(e.timestamp).toLocaleTimeString('nl-BE', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            let text = e.type;
            if (e.data && e.data.url) text = e.data.url;
            else if (e.data && e.data.selector) text = `${e.type}: ${e.data.selector}`;
            const div = document.createElement('div');
            div.className = 'feed-item';
            div.innerHTML = `<span class="icon">${icon}</span><span class="text">${text}</span><span class="time">${time}</span>`;
            feedEl.appendChild(div);
          }
        } else {
          feedEl.innerHTML = '<div class="feed-item"><span class="icon">😴</span><span class="text">Geen recente activiteit</span></div>';
        }
      } catch {
        feedEl.innerHTML = '<div class="feed-item"><span class="icon">⚠️</span><span class="text">API niet bereikbaar</span></div>';
      }
    }

    /** Update status indicators */
    async function refreshStatus() {
      const apiEl = document.getElementById('status-api');
      const voiceEl = document.getElementById('status-voice');
      const learningEl = document.getElementById('status-learning');

      try {
        const resp = await fetch(`${API}/status`);
        if (resp.ok) {
          apiEl.classList.add('active');
        } else {
          apiEl.classList.remove('active');
        }
      } catch {
        apiEl.classList.remove('active');
      }

      try {
        const resp = await fetch(`${API}/voice/status`);
        if (resp.ok) {
          const data = await resp.json();
          voiceEl.classList.toggle('active', !!data.listening);
        }
      } catch { voiceEl.classList.remove('active'); }

      try {
        const resp = await fetch(`${API}/behavior/stats`);
        if (resp.ok) {
          learningEl.classList.add('active');
        }
      } catch { learningEl.classList.remove('active'); }
    }

    /** Send quick command as Kees chat message */
    async function sendCommand() {
      const text = cmdInput.value.trim();
      if (!text) return;
      try {
        await fetch(`${API}/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
        });
        cmdInput.value = '';
      } catch {
        // Silently fail
      }
    }

    cmdSend.addEventListener('click', sendCommand);
    cmdInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); sendCommand(); }
    });

    // Poll every 2 seconds
    refreshActivity();
    refreshStatus();
    setInterval(refreshActivity, 2000);
    setInterval(refreshStatus, 5000);
  </script>
</body>
</html>
